<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUDA POS</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Masukkan data dari screenshot Anda di sini
        const firebaseConfig = {
            apiKey: "AIzaSyDvty30S6y_qc1eMs3kVctcIpLt6Suw4dA",
            authDomain: "mudapos-e8a4a.firebaseapp.com",
            projectId: "mudapos-e8a4a",
            storageBucket: "mudapos-e8a4a.firebasestorage.app",
            messagingSenderId: "864215339664",
            appId: "1:864215339664:web:1a97898b85ca3c1cb3be15"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        // Inisialisasi IndexedDB (Lokal)
        const dbLokal = new Dexie("MudaPosDB");
        dbLokal.version(1).stores({
            transaksi: '++id, namaItem, harga, status'
        });

        // Fungsi Simpan ke HP
        window.simpanLokal = async () => {
            await dbLokal.transaksi.add({
                namaItem: "Produk Contoh",
                harga: 10000,
                status: "Belum Sinkron"
            });
            alert("Berhasil simpan di HP!");
            tampilkanData();
        };

        // Fungsi Sinkron ke Firebase
        window.sinkronKeCloud = async () => {
            const dataBelumSinkron = await dbLokal.transaksi.where("status").equals("Belum Sinkron").toArray();
            
            if(dataBelumSinkron.length === 0) return alert("Semua data sudah sinkron!");

            for (let data of dataBelumSinkron) {
                try {
                    await addDoc(collection(dbCloud, "penjualan"), {
                        item: data.namaItem,
                        total: data.harga,
                        waktu: new Date()
                    });
                    // Update status di lokal setelah berhasil
                    await dbLokal.transaksi.update(data.id, { status: "Sudah Sinkron" });
                } catch (e) {
                    console.error("Gagal sinkron: ", e);
                }
            }
            alert("Sinkronisasi Selesai!");
            tampilkanData();
        };

        async function tampilkanData() {
            const all = await dbLokal.transaksi.toArray();
            document.getElementById("list").innerHTML = all.map(d => 
                `<li>${d.namaItem} - Rp${d.harga} [<b>${d.status}</b>]</li>`
            ).join("");
        }
        tampilkanData();
    </script>
</head>
<body>
    <h1>MUDA POS</h1>
    <button onclick="simpanLokal()" style="padding: 15px;">1. Tambah Transaksi (Lokal)</button>
    <br><br>
    <button onclick="sinkronKeCloud()" style="padding: 15px; background: #4CAF50; color: white;">2. Kirim ke Firebase (Cloud)</button>
    
    <h3>Daftar Transaksi di HP:</h3>
    <ul id="list"></ul>
</body>
</html>
