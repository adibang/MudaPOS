<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUDA POS</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Konfigurasi sesuai screenshot Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDvty30S6y_qc1eMs3kVctcIpLt6Suw4dA",
            authDomain: "mudapos-e8a4a.firebaseapp.com",
            projectId: "mudapos-e8a4a",
            storageBucket: "mudapos-e8a4a.firebasestorage.app",
            messagingSenderId: "864215339664",
            appId: "1:864215339664:web:1a97898b85ca3c1cb3be15"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const dbLokal = new Dexie("MudaPosDB");
        dbLokal.version(1).stores({
            transaksi: '++id, namaItem, harga, status'
        });

        window.simpanLokal = async () => {
            await dbLokal.transaksi.add({
                namaItem: "Gula Pasir",
                harga: 15000,
                status: "Belum Sinkron"
            });
            tampilkanData();
        };

        window.sinkronKeCloud = async () => {
            const pending = await dbLokal.transaksi.where("status").equals("Belum Sinkron").toArray();
            if(pending.length === 0) return alert("Semua data sudah aman di Cloud!");

            for (let data of pending) {
                try {
                    await addDoc(collection(dbCloud, "penjualan"), {
                        item: data.namaItem,
                        total: data.harga,
                        waktu: new Date()
                    });
                    await dbLokal.transaksi.update(data.id, { status: "Sudah Sinkron" });
                } catch (e) {
                    alert("Gagal sinkron: Periksa koneksi atau Test Mode Firebase");
                }
            }
            tampilkanData();
            alert("Berhasil Sinkron!");
        };

        async function tampilkanData() {
            const all = await dbLokal.transaksi.toArray();
            document.getElementById("list").innerHTML = all.reverse().map(d => 
                `<div style="border-bottom: 1px solid #ccc; padding: 10px;">
                    <b>${d.namaItem}</b> - Rp${d.harga.toLocaleString()} <br>
                    <small style="color:${d.status === 'Sudah Sinkron' ? 'green' : 'red'}">${d.status}</small>
                </div>`
            ).join("");
        }
        tampilkanData();
    </script>
</head>
<body style="font-family: Arial; margin: 0; padding: 20px; background: #f4f4f4;">
    <h2 style="text-align: center;">MUDA POS</h2>
    <button onclick="simpanLokal()" style="width: 100%; padding: 15px; background: white; border: 1px solid #ddd; margin-bottom: 10px; font-weight: bold;">1. TAMBAH TRANSAKSI (LOKAL)</button>
    <button onclick="sinkronKeCloud()" style="width: 100%; padding: 15px; background: #28a745; color: white; border: none; font-weight: bold;">2. KIRIM KE CLOUD</button>
    
    <div id="list" style="background: white; margin-top: 20px; border-radius: 8px;"></div>
</body>
</html>
