<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUDA POS - Input Barang</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvty30S6y_qc1eMs3kVctcIpLt6Suw4dA",
            authDomain: "mudapos-e8a4a.firebaseapp.com",
            projectId: "mudapos-e8a4a",
            storageBucket: "mudapos-e8a4a.firebasestorage.app",
            messagingSenderId: "864215339664",
            appId: "1:864215339664:web:1a97898b85ca3c1cb3be15"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const dbLokal = new Dexie("MudaPosDB");
        dbLokal.version(1).stores({ transaksi: '++id, namaItem, harga, status' });

        window.tambahKeLaci = async () => {
            const nama = document.getElementById('namaBarang').value;
            const harga = document.getElementById('hargaBarang').value;

            if(!nama || !harga) return alert("Isi nama dan harga dulu ya!");

            await dbLokal.transaksi.add({
                namaItem: nama,
                harga: parseInt(harga),
                status: "Belum Sinkron"
            });
            
            // Kosongkan form setelah simpan
            document.getElementById('namaBarang').value = "";
            document.getElementById('hargaBarang').value = "";
            tampilkanData();
        };

        window.sinkronKeCloud = async () => {
            const pending = await dbLokal.transaksi.where("status").equals("Belum Sinkron").toArray();
            if(pending.length === 0) return alert("Semua sudah sinkron!");

            for (let data of pending) {
                try {
                    await addDoc(collection(dbCloud, "penjualan"), {
                        item: data.namaItem,
                        total: data.harga,
                        waktu: new Date()
                    });
                    await dbLokal.transaksi.update(data.id, { status: "Sudah Sinkron" });
                } catch (e) { alert("Gagal kirim ke Cloud!"); }
            }
            tampilkanData();
            alert("Berhasil Sinkron!");
        };

        async function tampilkanData() {
            const all = await dbLokal.transaksi.toArray();
            document.getElementById("list").innerHTML = all.reverse().map(d => 
                `<div style="border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between;">
                    <div><b>${d.namaItem}</b><br><small style="color:${d.status === 'Sudah Sinkron' ? 'green' : 'red'}">${d.status}</small></div>
                    <div>Rp${d.harga.toLocaleString()}</div>
                </div>`
            ).join("");
        }
        tampilkanData();
    </script>
</head>
<body style="font-family: sans-serif; margin: 0; padding: 15px; background: #f9f9f9;">
    <h2 style="text-align: center;">MUDA POS</h2>
    
    <div style="background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <input type="text" id="namaBarang" placeholder="Nama Barang (Gula, Garam...)" style="width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="number" id="hargaBarang" placeholder="Harga (Rp)" style="width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px;">
        <button onclick="tambahKeLaci()" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold;">Simpan Ke HP</button>
    </div>

    <button onclick="sinkronKeCloud()" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px;">Sinkron Ke Cloud (Firebase)</button>
    
    <div id="list" style="background: white; border-radius: 10px; overflow: hidden;"></div>
</body>
</html>
