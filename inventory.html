    <style>

        .sidebar.open { transform:translateX(0); }
        .sidebar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:0.8rem; border-bottom:1px solid #eee; }
        .sidebar-header h2 { color:#006B54; font-size:1.2rem; }
        .close-sidebar { background:none; border:none; cursor:pointer; color:#999; }
        .sidebar-menu { list-style:none; }
        .sidebar-menu li { margin-bottom:0.2rem; }
        .sidebar-menu .menu-link { display:flex; align-items:center; gap:0.8rem; padding:0.6rem 0.8rem; color:#006B54; text-decoration:none; border-radius:8px; font-weight:500; font-size:0.95rem; cursor:pointer; }

        .has-submenu.open .submenu { display:block; }
        .submenu a { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0.8rem; color:#333; text-decoration:none; border-radius:6px; font-size:0.9rem; cursor:pointer; }
        .submenu a:hover { background:#e6f0ec; color:#006B54; }
        .submenu a.active { background:#e6f0ec; color:#006B54; font-weight:500; }
        .has-submenu .menu-link .arrow { margin-left:auto; transition:transform 0.3s; }

        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:150; display:none; }
        .overlay.active { display:block; }
        .main-content { padding:1.5rem; max-width:1400px; margin:0 auto; }
        .page-title { margin-bottom:1.2rem; font-size:1.6rem; font-weight:600; color:#006B54; }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;

    <!-- Script sidebar (non-module) -->
    <script>
        feather.replace();

        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }

    <!-- Script module utama -->
    <script type="module">
        import { auth, provider, dbCloud } from './js/firebase-config.js';
        import { signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { 
            collection, query, where, orderBy, limit, startAfter, getDocs,
            doc, runTransaction, serverTimestamp, onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        console.log('Inventory dengan pencarian otomatis (debounce)');

        // Referensi koleksi
        const produkCol = collection(dbCloud, 'produk');
        const unitCol = collection(dbCloud, 'unit');
        const stockMovementCol = collection(dbCloud, 'stockMovements');

        // Elemen DOM
        const inventoryBody = document.getElementById('inventoryBody');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const applyFilterBtn = document.getElementById('applyFilterBtn');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');
        const loginBtn = document.getElementById('loginBtn');

        // State pagination
        let lastVisible = null;
        let firstVisible = null;
        let pageSnapshots = [];
        let currentPageIndex = 0;
        const pageSize = 10;
        let currentSearchTerm = '';
        let currentSort = 'nama';

        // Data unit (real‑time)
        let unitMap = {};

        // Subscribe unit
        const unitQuery = query(unitCol, where('deleted', '==', false));
        onSnapshot(unitQuery, (snapshot) => {
            unitMap = {};
            snapshot.docs.forEach(doc => {
                unitMap[doc.id] = doc.data().nama;
            });
            console.log('Unit dimuat:', unitMap);
        }, (error) => {
            console.error('Gagal memuat unit:', error);
        });

        // ========== FORMAT STATUS ==========
        function getStatusBadge(stok, minStok) {
            if (stok <= 0) return '<span class="badge badge-danger">Habis</span>';
            if (stok <= minStok * 0.5) return '<span class="badge badge-danger">Kritis</span>';
            if (stok <= minStok) return '<span class="badge badge-warning">Menipis</span>';
            return '<span class="badge badge-success">Aman</span>';
        }

        // ========== MEMBANGUN QUERY DASAR ==========
        function buildBaseQuery() {
            let baseQuery = query(produkCol, where('deleted', '==', false));

            if (currentSort === 'stokAsc') {
                baseQuery = query(baseQuery, orderBy('stokAwal'), orderBy('nama'));
            } else if (currentSort === 'stokDesc') {
                baseQuery = query(baseQuery, orderBy('stokAwal', 'desc'), orderBy('nama'));
            } else {
                // default 'nama' atau 'status' (status diurutkan berdasarkan stok kecil dulu)
                baseQuery = query(baseQuery, orderBy('nama'));
            }
            return baseQuery;
        }

        // ========== FUNGSI UNTUK MENJALANKAN QUERY PENCARIAN ==========
        async function executeSearchQuery(direction = 'next') {
            const searchTerm = currentSearchTerm.toLowerCase().trim();
            const baseQuery = buildBaseQuery();

            if (!searchTerm) {
                let q = query(baseQuery, limit(pageSize));
                if (direction === 'next' && lastVisible) {
                    q = query(q, startAfter(lastVisible));
                } else if (direction === 'prev' && currentPageIndex > 0) {
                    return { type: 'normal', useSnapshot: true };
                }
                return { type: 'normal', query: q };
            } else {
                const fields = ['nama', 'kode', 'barcode'];
                const queries = fields.map(field => {
                    return query(
                        baseQuery,
                        where(field, '>=', searchTerm),
                        where(field, '<=', searchTerm + '\uf8ff'),
                        limit(pageSize)
                    );
                });
                return { type: 'search', queries };
            }
        }

        // ========== LOAD HALAMAN ==========
        async function loadPage(direction = 'next') {
            try {
                const exec = await executeSearchQuery(direction);

                if (exec.type === 'normal' && exec.useSnapshot) {
                    const prevSnapshot = pageSnapshots[currentPageIndex - 1];
                    if (prevSnapshot) {
                        renderProduk(prevSnapshot.docs);
                        currentPageIndex--;
                        lastVisible = prevSnapshot.docs[prevSnapshot.docs.length - 1];
                        firstVisible = prevSnapshot.docs[0];
                        pageInfo.textContent = `Halaman ${currentPageIndex + 1}`;
                        prevPageBtn.disabled = currentPageIndex === 0;
                        nextPageBtn.disabled = prevSnapshot.docs.length < pageSize;
                    }
                    return;
                }

                let docs = [];
                if (exec.type === 'normal') {
                    const snapshot = await getDocs(exec.query);
                    docs = snapshot.docs;
                    if (direction === 'next') {
                        pageSnapshots.push(snapshot);
                        currentPageIndex = pageSnapshots.length - 1;
                    }
                    lastVisible = docs[docs.length - 1];
                    firstVisible = docs[0];
                } else {
                    // Mode pencarian
                    const snapshots = await Promise.all(exec.queries.map(q => getDocs(q)));
                    const docsMap = new Map();
                    snapshots.forEach(snap => {
                        snap.docs.forEach(doc => {
                            if (!docsMap.has(doc.id)) {
                                docsMap.set(doc.id, doc);
                            }
                        });
                    });
                    docs = Array.from(docsMap.values());
                    docs.sort((a, b) => {
                        const aVal = a.get('nama') || '';
                        const bVal = b.get('nama') || '';
                        return aVal.localeCompare(bVal);
                    });
                    docs = docs.slice(0, pageSize);

                    pageSnapshots = [];
                    currentPageIndex = 0;
                    lastVisible = null;
                    firstVisible = null;
                }

                if (docs.length === 0) {
                    inventoryBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Tidak ada produk</td></tr>';
                } else {
                    renderProduk(docs);
                }

                if (exec.type === 'search') {
                    prevPageBtn.disabled = true;
                    nextPageBtn.disabled = true;
                    pageInfo.textContent = 'Halaman 1 (pencarian)';
                } else {
                    prevPageBtn.disabled = currentPageIndex === 0;
                    nextPageBtn.disabled = docs.length < pageSize;
                    pageInfo.textContent = `Halaman ${currentPageIndex + 1}`;
                }
            } catch (error) {
                console.error('Gagal memuat inventory:', error);
                inventoryBody.innerHTML = `<tr><td colspan="6" style="color:red;">Gagal memuat: ${error.message}</td></tr>`;
            }
        }

        // ========== RENDER PRODUK ==========
        function renderProduk(docs) {
            let html = '';
            docs.forEach(doc => {
                const p = doc.data();
                const stok = p.stokAwal || 0;
                const minStok = p.stokMinimal || 0;
                const status = getStatusBadge(stok, minStok);
                const unit = unitMap[p.unitId] || '';
                const namaEscape = p.nama.replace(/'/g, "\\'");
                html += `
                <tr>
                    <td>${p.kode || '-'}</td>
                    <td>${p.nama}</td>
                    <td>${stok} ${unit}</td>
                    <td>${minStok} ${unit}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn-icon" onclick="openAddModal('${doc.id}', '${namaEscape}', ${stok})" title="Tambah Stok"><i data-feather="plus-circle"></i></button>
                        <button class="btn-icon" onclick="openReduceModal('${doc.id}', '${namaEscape}', ${stok})" title="Kurangi Stok"><i data-feather="minus-circle"></i></button>
                        <button class="btn-icon" onclick="openOpnameModal('${doc.id}', '${namaEscape}', ${stok})" title="Stok Opname"><i data-feather="rotate-cw"></i></button>
                    </td>
                </tr>`;
            });
            inventoryBody.innerHTML = html;
            feather.replace();
        }

        // ========== FUNGSI UNTUK MENERAPKAN FILTER ==========
        function applyFilter() {
            currentSearchTerm = searchInput.value;
            currentSort = sortSelect.value;
            pageSnapshots = [];
            currentPageIndex = 0;
            lastVisible = null;
            firstVisible = null;
            loadPage('next');
        }

        // Event listener untuk tombol Terapkan
        applyFilterBtn.addEventListener('click', applyFilter);

        // Event listener untuk pencarian otomatis (debounce)
        let debounceTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => {
                applyFilter();
            }, 500); // tunggu 500ms setelah berhenti mengetik
        });

        // Event listener untuk pencarian dengan Enter (opsional)
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearTimeout(debounceTimeout); // batalkan debounce jika ada
                applyFilter();
            }
        });

        // Event listener untuk navigasi halaman
        prevPageBtn.addEventListener('click', () => {
            loadPage('prev');
        });

        nextPageBtn.addEventListener('click', () => {
            loadPage('next');
        });

        // ========== FUNGSI MODAL ==========
        window.openAddModal = (productId, productName, currentStock) => {
            document.getElementById('addProductId').value = productId;
            document.getElementById('addProductName').value = productName;
            document.getElementById('addCurrentStock').value = currentStock;
            document.getElementById('addQuantity').value = '';
            document.getElementById('addReason').value = '';
            document.getElementById('modalAddStock').classList.add('active');
        };
        window.openReduceModal = (productId, productName, currentStock) => {
            document.getElementById('reduceProductId').value = productId;
            document.getElementById('reduceProductName').value = productName;
            document.getElementById('reduceCurrentStock').value = currentStock;
            document.getElementById('reduceQuantity').value = '';
            document.getElementById('reduceReason').value = '';
            document.getElementById('modalReduceStock').classList.add('active');
        };
        window.openOpnameModal = (productId, productName, currentStock) => {
            document.getElementById('opnameProductId').value = productId;
            document.getElementById('opnameProductName').value = productName;
            document.getElementById('opnameCurrentStock').value = currentStock;
            document.getElementById('opnameNewStock').value = currentStock;
            document.getElementById('opnameReason').value = '';
            document.getElementById('modalOpname').classList.add('active');
        };
        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
        };

        // ========== FUNGSI SIMPAN ==========
        document.getElementById('saveAddStock').addEventListener('click', async () => {
            const productId = document.getElementById('addProductId').value;
            const qty = parseInt(document.getElementById('addQuantity').value);
            const reason = document.getElementById('addReason').value;
            if (!qty || qty <= 0) {
                alert('Jumlah harus diisi dan positif');
                return;
            }
            try {
                await runTransaction(dbCloud, async (transaction) => {
                    const produkRef = doc(produkCol, productId);
                    const produkSnap = await transaction.get(produkRef);
                    if (!produkSnap.exists()) throw new Error('Produk tidak ditemukan');
                    const produk = produkSnap.data();
                    const newStock = (produk.stokAwal || 0) + qty;

                    transaction.update(produkRef, { 
                        stokAwal: newStock, 
                        updatedAt: serverTimestamp() 
                    });

                    const movementRef = doc(stockMovementCol);
                    transaction.set(movementRef, {
                        produkId: productId,
                        type: 'add',
                        quantity: qty,
                        previousStock: produk.stokAwal || 0,
                        newStock: newStock,
                        reason: reason || '',
                        createdAt: serverTimestamp(),
                        userId: auth.currentUser?.uid || null
                    });
                });
                alert('Stok berhasil ditambahkan');
                closeModal('modalAddStock');
                loadPage('next');
            } catch (error) {
                console.error(error);
                alert('Gagal menambah stok: ' + error.message);
            }
        });

        document.getElementById('saveReduceStock').addEventListener('click', async () => {
            const productId = document.getElementById('reduceProductId').value;
            const qty = parseInt(document.getElementById('reduceQuantity').value);
            const reason = document.getElementById('reduceReason').value;
            if (!qty || qty <= 0) {
                alert('Jumlah harus diisi dan positif');
                return;
            }
            try {
                await runTransaction(dbCloud, async (transaction) => {
                    const produkRef = doc(produkCol, productId);
                    const produkSnap = await transaction.get(produkRef);
                    if (!produkSnap.exists()) throw new Error('Produk tidak ditemukan');
                    const produk = produkSnap.data();
                    const currentStock = produk.stokAwal || 0;
                    if (currentStock < qty) {
                        throw new Error('Stok tidak mencukupi');
                    }
                    const newStock = currentStock - qty;

                    transaction.update(produkRef, { 
                        stokAwal: newStock, 
                        updatedAt: serverTimestamp() 
                    });

                    const movementRef = doc(stockMovementCol);
                    transaction.set(movementRef, {
                        produkId: productId,
                        type: 'reduce',
                        quantity: qty,
                        previousStock: currentStock,
                        newStock: newStock,
                        reason: reason || '',
                        createdAt: serverTimestamp(),
                        userId: auth.currentUser?.uid || null
                    });
                });
                alert('Stok berhasil dikurangi');
                closeModal('modalReduceStock');
                loadPage('next');
            } catch (error) {
                console.error(error);
                alert('Gagal mengurangi stok: ' + error.message);
            }
        });

        document.getElementById('saveOpname').addEventListener('click', async () => {
            const productId = document.getElementById('opnameProductId').value;
            const newStock = parseInt(document.getElementById('opnameNewStock').value);
            const reason = document.getElementById('opnameReason').value;
            if (isNaN(newStock) || newStock < 0) {
                alert('Stok baru harus diisi dan tidak negatif');
                return;
            }
            try {
                await runTransaction(dbCloud, async (transaction) => {
                    const produkRef = doc(produkCol, productId);
                    const produkSnap = await transaction.get(produkRef);
                    if (!produkSnap.exists()) throw new Error('Produk tidak ditemukan');
                    const produk = produkSnap.data();
                    const oldStock = produk.stokAwal || 0;

                    transaction.update(produkRef, { 
                        stokAwal: newStock, 
                        updatedAt: serverTimestamp() 
                    });

                    const movementRef = doc(stockMovementCol);
                    transaction.set(movementRef, {
                        produkId: productId,
                        type: 'opname',
                        quantity: newStock - oldStock,
                        previousStock: oldStock,
                        newStock: newStock,
                        reason: reason || '',
                        createdAt: serverTimestamp(),
                        userId: auth.currentUser?.uid || null
                    });
                });
                alert('Stok opname berhasil');
                closeModal('modalOpname');
                loadPage('next');
            } catch (error) {
                console.error(error);
                alert('Gagal melakukan opname: ' + error.message);
            }
        });

        // ========== AUTH ==========
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.innerHTML = '<i data-feather="log-out" width="18"></i><span>Logout</span>';
            } else {
                loginBtn.innerHTML = '<i data-feather="log-in" width="18"></i><span>Login</span>';
            }
            feather.replace();
        });
        loginBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (user) {
                try { await signOut(auth); } catch (error) { alert('Gagal logout: ' + error.message); }
            } else {
                try { await signInWithPopup(auth, provider); } catch (error) { alert('Gagal login: ' + error.message); }
            }
        });

        // ========== TOMBOL SYNC DAN RESET ==========
        document.getElementById('syncBtn').addEventListener('click', () => {
            alert('Sinkronasi real-time aktif. Tidak perlu sync manual.');
        });
        document.getElementById('resetDbBtn').addEventListener('click', () => {
            alert('Data tersimpan di cloud, reset lokal tidak diperlukan.');
        });

        // ========== INITIAL LOAD ==========
        loadPage('next');
    </script>
</body>
</html>
